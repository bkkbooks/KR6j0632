body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯爾時世尊告阿難言有陀羅尼名曰寶髻能與衆生作大利益能滅衆生極重罪業阿難往昔帝釋與修羅戰時天帝釋退敗奔走怖畏無量於是疾速來詣佛所哀告我言世尊大慈願垂愍察我怖修羅不能安住惟願大慈賜我安隱阿難我聞帝釋作是語已即告之言汝當勿怖施汝擁護天主過去劫時有佛世界名曰觀照彼土有佛名觀自在如來彼佛授我寶髻陀羅尼是陀羅尼一俱胝佛異口同說有大威力能降吉祥若復有人書寫頂戴讀誦受持我知是人滅一切罪增無量福常自擁護及能利他天主汝常憶念書寫頂戴令汝所作一切隨心此陀羅尼王亦名隨求能與衆生最上善利彼阿修羅當自息心設來鬪戰退敗降伏我即為說寶髻陀羅尼曰那謨引沒馱引野一那謨引達哩摩二合引野二那莫僧伽引野三那莫颯鉢多二合引曩引三藐訖三二合沒馱引曩引四薩室囉二合引嚩哥僧伽引曩引五薩哩嚩二合沒馱冒提薩埵引難引左六怛𭔞他引七唵引惹野割哩八沒度引跢引囉尼九鉢尾怛囉二合目詰十薩哩嚩二合莽誐羅馱囉左十一𡁠仁際切暮引帝引那引那引朗哥引囉尾部引始帝引十二薩賀薩囉二合部𡁠引十三薩賀薩囉二合引儞引底哩二合十四薩賀薩囉二合室哩引十五摩尼昆拏隸引十六散那引賀散捺提引十七尾唧怛囉二合引梨達哩引十八贊捺囉二合素哩也二合阿底哩引計引十九阿引哥引舍誐誐那左引哩尼二十莽誐羅室囉𡁠暮引帝引二十一鉢尾怛囉二合訖哩二合多莽誐隸引二十二部引哩彌引馱引羯囉尼引二十三祖嚕祖嚕二十四稅引多鉢致引二十五彌引嚕彌引嚕二十六稅引多引嚩那提引二十七虎嚕虎嚕二十八鉢尾怛囉二合目詰二十九酤嚕酤嚕三十贊捺囉二合目詰三十一阿引儞爹嚩舍嚩哩底二合儞三十二仁敢切婆儞三十三莽誐囉馱引囉尼三十四塞擔二合婆儞三十五薩哩嚩二合尾𭔞引達囉摩引帝引三十六謨引賀儞三十七阿謨引伽播引舍賀悉帝二合引三十八薩哩嚩二合跋野尾謨引左儞三十九囉引惹陬引囉引擬儞二合四十尾疏引那哥跋野鉢囉二合設摩儞四十一哥引枯引哩那二合儞嚩引囉尼四十二唵引呬哩呬哩四十三惹仁左切下同野哥哩四十四嚩羅哥哩四十五達那哥哩四十六帝引惹塞哥二合哩四十七尾嚩引那鉢囉二合設摩儞四十八沒馱儞嚩引囉尼四十九鉢囉作訖囉二合鉢囉二合設摩儞五十鉢囉賽𭔞儞嚩引囉尼五十一沒度引跢引囉尼五十二鉢囉二合部引多吠引邏摩尼摩尼五十三摩賀引摩尼五十四摩尼滿馱儞五十五底哩二合路哥引路哥割哩五十六底哩二合補囉那誐囉五十七尾特網二合娑儞五十八鉢囉賽𭔞尾捺囉二合引鉢尼五十九薩哩嚩二合訖哩二合爹引哥哩摩二合儞素捺儞六十咩引提曩引鉢囉二合設摩儞引六十一唵引唧隸引六十二蜜隸引六十三尾隸引娑嚩二合引賀引六十四唧里蜜里娑嚩二合引賀引六十五左詰里六十六左詰里娑嚩二合引賀引六十七贊拏引里彌致儞娑嚩二合引賀引六十八烏引哩馱二合計引室氷誐隸引六十九氷誐邏引嗤引捺提目詰娑嚩二合引賀引七十娑囉娑囉七十一悉哩悉哩七十二蘇嚕蘇嚕七十三捫左捫左七十四捫左引鉢野七十五鉢囉二合設摩野七十六沒度引多引囉尼發吒半音七十七唧多儞哩摩二合羅哥囉尼發吒半音七十八阿蘇囉儞哩伽二合引怛儞發吒半音七十九惹野羯哩發吒半音八十室哩二合引羯哩發吒半音八十一薩賀薩囉二合室哩引發吒半音八十二薩賀薩囉二合㪍𡁠引發吒半音八十三薩賀薩囉二合泥去底哩二合引發吒半音八十四薩哩嚩二合尾𭔞引達囉那莫塞訖哩二合帶引發吒半音八十五薩哩嚩二合設咄嚕二合那引設儞發吒半音八十六薩哩嚩跋野尾謨叉尼發吒半音八十七鉢哩作訖囉二合儞嚩引囉尼發吒半音八十八鉢囉賽𭔞尾捺囉二合引鉢尼發吒半音八十九薩哩嚩二合咩引提鉢囉二合設摩儞發吒半音九十薩哩嚩二合屹囉二合呼引蹉引捺儞發吒半音九十一犖叉犖叉摩摩薩哩嚩二合沒馱冒地薩埵引曩引帝引惹娑引九十二薩摩引多引必底哩二合𧹞引九十三薩訥呬底哩二合𧹞引九十四素鉢娑他二合引以哥引曩引九十五薩波哩嚩引囉引𧹞引九十六帝引惹娑引薩哩嚩二合咩引提曩引九十七薩哩嚩二合設哩引囕九十八薩哩嚩二合跋踰引鉢捺囉二合吠引毗藥二合九十九薩哩嚩二合欲提引毗藥二合一百薩哩嚩二合咩引提毗藥一百一薩哩嚩二合訥訖哩二合帝引毗藥二合一百二薩哩嚩二合訖哩二合爹哥引枯引禰引毗藥二合娑嚩二合引賀引一百三薩哩嚩二合尾試引毗藥二合一百四薩哩嚩二合哥引野唧多閉拏引毗藥二合室左二合一百五犖叉犖叉摩摩娑嚩二合引賀引一百六時天帝釋得此陀羅尼已歡喜頂戴憶念受持常與眷屬安樂而住阿難此陀羅尼威力廣大不獨降伏阿修羅王乃至一切天龍夜叉乾闥婆迦樓羅緊那羅及部多吠多拏等惱亂衆生者以陀羅尼威力擁護不能為害又復能除飢饉疾疫毒藥夭歿夢寐不祥惡魔驚恐或復有人為求財寶或求子息持誦此陀羅尼者悉得隨意財富無量眷屬增盛阿難此陀羅尼功德殊勝我若具說不可窮盡爾時阿難聞佛說此陀羅尼已志心受持禮佛而退
